services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: migrator
    environment: &api-environment
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__InventoryFlowDatabase: Server=sql,1433;Database=InventoryFlow;User Id=sa;Password=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env};TrustServerCertificate=True;Encrypt=False
      Jwt__SigningKey: ${Jwt__SigningKey:?Set Jwt__SigningKey in .env}
    depends_on:
      sql:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: final
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "5255:8080"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  sql-data:
