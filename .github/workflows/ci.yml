name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore backend/InventoryFlow.sln
      - name: Build
        run: dotnet build backend/InventoryFlow.sln --no-restore
      - name: Test
        run: dotnet test backend/InventoryFlow.sln --no-build --no-restore
      - name: Verify formatting
        run: dotnet format backend/InventoryFlow.sln --verify-no-changes --no-restore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
